# Per-plugin test stack for Elgg 4.x.
#
# PLUGIN_ID must be set in docker/.env before starting the stack.
#
# Run all commands from <plugin>/ (the parent of this directory):
#
#   docker compose -f docker/docker-compose.yml up -d
#   docker compose -f docker/docker-compose.yml exec elgg bash
#   docker compose -f docker/docker-compose.yml --profile test run --rm node \
#     sh -c "cd /plugin/tests/playwright && npm ci && npx playwright test"

name: ${PLUGIN_ID:?set PLUGIN_ID in docker/.env}-elgg4

services:
  elgg:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - elgg-data:/var/www/data
      # Plugin source is mounted read-write so composer install and test
      # artifacts written inside the container land back in the repo.
      - ..:/var/www/html/mod/${PLUGIN_ID}
    environment:
      PLUGIN_ID: ${PLUGIN_ID}
      ELGG_DB_HOST: db
      ELGG_DB_NAME: elgg
      ELGG_DB_USER: elgg
      ELGG_DB_PASS: elgg
      # Use the internal Docker service hostname so Playwright can follow
      # Elgg redirects without hitting localhost:PORT (which the node
      # container cannot reach).
      ELGG_SITE_URL: "http://elgg/"
      ELGG_DATA_ROOT: "/var/www/data/"
      ELGG_DB_PREFIX: "elgg_"
      ELGG_ADMIN_EMAIL: "admin@example.com"
      ELGG_ADMIN_PASSWORD: "admin12345"
    ports:
      - "${ELGG_PORT:-8480}:80"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: /usr/local/bin/elgg-install.sh

  db:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: elgg
      MYSQL_USER: elgg
      MYSQL_PASSWORD: elgg
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3304}:3306"

  # Node.js + Playwright, activated via --profile test so it does not
  # start with `docker compose up`. Mounts only this plugin's source at
  # /plugin so a destructive in-container command cannot touch anything
  # outside this repo.
  node:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    volumes:
      - ..:/plugin
    working_dir: /plugin
    environment:
      PLUGIN_ID: ${PLUGIN_ID}
      ELGG_BASE_URL: "http://elgg"
      ELGG_PORT: "80"
      ELGG_DB_HOST: db
      ELGG_DB_PORT: "3306"
      ELGG_DB_USER: elgg
      ELGG_DB_PASS: elgg
      ELGG_DB_NAME: elgg
    depends_on:
      - elgg
    profiles:
      - test

volumes:
  elgg-data:
  db-data:
